name: Update COT Data

on:
  schedule:
    - cron: '0 20 * * 5'
  workflow_dispatch:

jobs:
  update-cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download & extract CFTC COT data
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p data/cot
          CURRENT_YEAR=$(date -u +%Y)

          for YEAR in $(seq 2019 "$CURRENT_YEAR"); do
            ZIP_URL="https://www.cftc.gov/files/dea/history/deacot${YEAR}.zip"
            TMP_ZIP="/tmp/cot_${YEAR}.zip"
            TMP_DIR="/tmp/cot_${YEAR}"
            OUT_FILE="data/cot/${YEAR}.csv"

            echo "Downloading ${YEAR} from ${ZIP_URL}"
            rm -rf "$TMP_DIR"
            mkdir -p "$TMP_DIR"

            HTTP_STATUS=$(curl -L --silent --show-error --output "$TMP_ZIP" --write-out "%{http_code}" "$ZIP_URL")

            if [ "$HTTP_STATUS" != "200" ]; then
              echo "ERROR: ${YEAR} download failed with HTTP ${HTTP_STATUS}"
              exit 1
            fi

            unzip -o "$TMP_ZIP" -d "$TMP_DIR" >/dev/null

            DATA_FILE=$(find "$TMP_DIR" \( -iname "*.txt" -o -iname "*.csv" \) | head -n 1)

            if [ -z "${DATA_FILE}" ]; then
              echo "ERROR: ${YEAR} ZIP contained no .txt or .csv file"
              exit 1
            fi

            cp "$DATA_FILE" "$OUT_FILE"
            echo "Saved ${OUT_FILE} ($(wc -l < "$OUT_FILE") lines)"
          done

      - name: Commit & push if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/cot/

          if git diff --staged --quiet; then
            echo "No changes — data already up to date"
          else
            TODAY=$(date -u +%Y-%m-%d)
            git commit -m "chore: update COT data ${TODAY}"
            git push
            echo "COT data updated and pushed"
          fi
